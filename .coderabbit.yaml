# CodeRabbit configuration for truecrew-dashboard.
# Reference: https://docs.coderabbit.ai/reference/configuration
#
# This file only pins the settings this repo cares about. Anything not
# listed here (review profile restrictions, base-branch review scope, etc.)
# continues to come from the CodeRabbit Organization/Repository UI settings
# already configured for this repo — see the PR description for what's
# currently inherited from there.

language: en-US

reviews:
  profile: chill
  high_level_summary: true
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*.ts"
      instructions: >
        Prioritize correctness, regression risk, test coverage, and
        type-safety over style or cosmetic suggestions. Avoid broad
        architecture or refactor suggestions unless directly relevant to
        the lines actually changed in this PR.
    - path: "lib/obsidian/read.ts"
      instructions: >
        This file reconciles vault note "type" taxonomy against Supabase's
        notes.type values. A DB type and a vault frontmatter type
        intentionally differing (e.g. DB "ticket" vs vault "maintenance")
        is not automatically a bug — check whether the split is documented
        (see issues #97/#98) before flagging it as an inconsistency. Watch
        closely for changes to NOTE_TYPES, inferNoteType, or the path-based
        fallback logic, since an incorrect fallback silently mislabels
        notes.
    - path: "lib/{librarian,maintenance}/**/*.ts"
      instructions: >
        These modules follow an established fail-open vs. hard-fail
        contract (e.g. vault writes may be skipped/fail-open when the
        vault isn't configured, but Supabase index writes and audit events
        after a successful write are hard-fail and should propagate
        errors). If a change alters which errors are swallowed vs.
        propagated, flag it explicitly and check whether existing tests
        encode the current contract.
    - path: "lib/mappers/**/*.ts"
      instructions: >
        These mappers are the client-visible taxonomy boundary — they
        decide which DB fields (notably `agent`) survive into the
        client-side Note/Artifact shape. Collapsing a real agent value
        (e.g. "maintenance") to undefined here silently makes a domain
        invisible client-side (this was the root cause of #97). Flag any
        change that narrows, drops, or hardcodes `agent`/`type` handling
        instead of preserving known values.
    - path: "src/types/index.ts"
      instructions: >
        `Note.agent` and `Note.type` are the client-side taxonomy
        discriminators shared by Librarian and Maintenance (#97/#98).
        Narrowing either union, or removing a variant, can silently break
        mapping/filtering logic elsewhere (lib/mappers, lib/*/artifact.ts,
        KnowledgePage). Treat such changes as high-risk and check they're
        matched by an equivalent update to the mapper and any filters.
    - path: "**/*.test.ts"
      instructions: >
        Favor correctness of the runtime behavior under test over test
        code style. Flag missing edge cases (misconfiguration, unsupported
        input/method, whitespace-only required fields treated as missing,
        audit events firing only after successful writes) more than
        formatting or naming nitpicks.

chat:
  auto_reply: true

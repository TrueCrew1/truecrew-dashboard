name: Feature request
description: Propose a new feature or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / opportunity
      description: What problem does this solve, or what opportunity does it address?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true once this is done?
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints / risks
      description: Any known constraints, risks, or trade-offs to be aware of.
    validations:
      required: false

  - type: input
    id: workflow-context
    attributes:
      label: Workflow context
      description: Where in True Crew does this belong? (route, agent, dashboard area)
      placeholder: "e.g. Today view, Build agent, Monitor page"
    validations:
      required: false

  - type: textarea
    id: links
    attributes:
      label: Links / screenshots (optional)
      description: Related issues, PRs, mockups, or screenshots.
    validations:
      required: false

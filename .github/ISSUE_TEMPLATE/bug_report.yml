name: Bug report
description: Report something that's broken or not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Steps to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser/OS, deployment (prod/preview/local), and any other relevant environment detail.
      placeholder: "e.g. Chrome 126 / macOS, Vercel preview deploy"
    validations:
      required: false

  - type: input
    id: related
    attributes:
      label: Related PR / branch / story (optional)
    validations:
      required: false

  - type: checkboxes
    id: no-secrets
    attributes:
      label: Checklist
      options:
        - label: I confirm no secrets, tokens, or credentials are included in any screenshots or logs above.
          required: true

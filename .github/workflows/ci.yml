name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Hobby plan hard-caps Serverless Functions at 12; each api/**/*.{ts,js} counts as one.
      - run: npm run check:api-functions
      - run: npm run lint
      - run: npm run test
      - run: npm run build

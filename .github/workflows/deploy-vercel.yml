name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Production-only deploy — scope the environment here rather than
    # putting production secrets at the workflow level.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN not set. Add secrets per docs/DEPLOY_NOW.md"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.configured == 'true'
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
        if: steps.secrets.outputs.configured == 'true'

      - name: Install Vercel CLI
        if: steps.secrets.outputs.configured == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: steps.secrets.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.secrets.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          VITE_USE_LIVE_API: "true"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy
        if: steps.secrets.outputs.configured == 'true'
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Health check
        if: steps.secrets.outputs.configured == 'true'
        run: curl -fsS "${{ steps.deploy.outputs.url }}/api/health"

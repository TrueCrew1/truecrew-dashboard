name: Sync LLM env to Vercel

on:
  workflow_dispatch:
    inputs:
      internal_secret:
        description: "New INTERNAL_API_SECRET (also sets VITE_INTERNAL_KEY)"
        required: true
        type: string

concurrency:
  group: sync-llm-env-vercel
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Sync environment variables to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          INTERNAL_SECRET: ${{ inputs.internal_secret }}
          AZURE_OPENAI_ENDPOINT: https://true-crew-resource.openai.azure.com
          AZURE_AI_RESOURCE_ENDPOINT: https://true-crew-resource.services.ai.azure.com
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN not configured in repository secrets"
            exit 1
          fi

          upsert_env() {
            local key="$1"
            local value="$2"
            vercel env rm "$key" production --yes --token="$VERCEL_TOKEN" 2>/dev/null || true
            printf '%s' "$value" | vercel env add "$key" production --token="$VERCEL_TOKEN"
            echo "Synced $key"
          }

          upsert_env AZURE_OPENAI_ENDPOINT "$AZURE_OPENAI_ENDPOINT"
          upsert_env AZURE_AI_RESOURCE_ENDPOINT "$AZURE_AI_RESOURCE_ENDPOINT"
          upsert_env INTERNAL_API_SECRET "$INTERNAL_SECRET"
          upsert_env VITE_INTERNAL_KEY "$INTERNAL_SECRET"

          echo "Azure key left unchanged on Vercel (already configured)."

      - name: Redeploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npm ci
          vercel build --prod --token="$VERCEL_TOKEN"
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed to $url"
